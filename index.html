<script>
const VOICE_GUIDE=`VOICE & STYLE RULES FOR plantbased.rs (MANDATORY):

TONE: You are writing for a professional news publication sub-site, NOT a personal blog. Informative, authoritative, approachable, like a knowledgeable journalist writing for a mainstream audience. Third-person by default. First person ONLY when category is Recepti and it is a personal recipe experience.

SERBIAN LANGUAGE (CRITICAL — ERRORS HERE ARE UNACCEPTABLE):
- Serbian latin script ONLY, never cyrillic.
- CORRECT PADEZI (grammatical cases) is the #1 priority. Double-check every noun, adjective, and pronoun for case agreement.
- Use Serbian forms, NEVER Croatian: ugljenični (not ugljični), hleb (not kruh), nedelja (not tjedan), voz (not vlak), hiljada (not tisuća), tačka (not točka).
- Proper nouns: capitalize both words in "Bliski Istok", "Severna Amerika", "Južna Koreja".
- Adjective agreement: "Korejska kuhinja" not "Korejski kuhinja". Always match gender.
- Use Serbian words, NEVER English when Serbian exists: zamrzivač (not freezer), mešavina (not mix), napitak (not drink), specijalizovane (not specializovane).
- Use "Vi/Vas/Vam/Vaš" capitalized when addressing the reader formally.
- Scientific/Latin species names in <em>italic</em> tags.
- Numbers: spell out one through ten, digits for 11+.

TITLES: Long, descriptive, SEO-heavy. Use colons or questions. Examples from top articles:
"Začin koji čuva jetru, kosti i održava stabilan nivo šećera u krvi: Zdravstveni benefiti koje možda niste znali"
"Da li tačkica buđi treba da nas odvrati od korišćenja takvog hleba? Dilema je razrešena"
"Ovo se ne viđa svaki dan, a fenomenalno je: Kako napraviti džem od kivija?"

STRUCTURE:
- Opening hook paragraph that draws the reader in with a relatable scenario or surprising fact
- 3-5 H2 sections with informative headings (not clickbait)
- 1-3 short paragraphs per section
- <strong>bold key terms</strong> on FIRST mention only (use HTML <strong> tags, NEVER markdown **)
- Closing paragraph with practical takeaway and a measured caveat

STYLE:
- Measured enthusiasm: "odličan", "izvanredan", "fenomenalno" OK but sparingly.
- NEVER use dramatic words: "brutalno", "šokantno", "ludo", "neverovatno", "revolucionarno".
- NO em-dashes (—). Use commas, periods, or parentheses.
- Keep sentences clear and medium-length. Vary paragraph length.
- Write like the best Serbian health/food journalist, not like AI.

BANNED AI PHRASES (never use these):
"U današnje vreme", "Važno je napomenuti", "Kada je reč o", "Na kraju dana", "Hajde da zaronimo", "Bez obzira da li ste", "Od... do...", "Ispostavlja se da", "Sve u svemu"

INLINE DISCUSSIONS (like plantbasedhouse.com):
When referencing online discussions, use this exact pattern:
Describe what the person discussed, then hyperlink a key phrase to the actual thread: Jedan korisnik na Redditu ističe da <a href="URL">biljni proteini mogu u potpunosti zameniti životinjske</a>, dok se u drugoj diskusiji naglašava...`;

const VOICE_GUIDE_EN=`VOICE & STYLE RULES FOR plantbasedhouse.com (MANDATORY):
TONE: Professional news publication. Informative, authoritative, approachable journalist voice. Third-person by default.
TITLES: Long, descriptive, SEO-heavy, colons or questions.
STRUCTURE: Opening hook, H2 sections, 1-3 paragraphs per section, <strong>bold key terms</strong> on first mention (HTML tags only, never markdown **), closing with caveat.
STYLE: Measured enthusiasm. Never dramatic. No em-dashes. Clear sentences.
BANNED: "In today's world", "It's worth noting", "When it comes to", "Let's dive in", "At the end of the day", "Whether you're a... or..."
INLINE DISCUSSIONS: Describe what the person said, hyperlink key phrase: One Reddit user points out that <a href="URL">plant proteins can fully replace animal proteins</a>.`;

const state={apiKey:localStorage.getItem("pb_api_key")||"",showSetup:!localStorage.getItem("pb_api_key"),lang:"sr",topic:"",url:"",cat:"Top Namirnice",mode:null,phase:null,done:[],error:null,ideas:[],selIdea:null,sources:[],result:null,picking:false,length:"medium",tone:50,shutterstock:[],seo:null};
const CATS=["Top Namirnice","PB Kuhinja","Recepti","Zdravlje","Lifestyle","Vesti","Tips & Tricks"];
const LENGTHS={short:"Short (400-600 words)",medium:"Medium (600-900 words)",long:"Long (900-1200+ words)"};
const PH_D=[{k:"trending",l:"Scanning trending topics",i:"📡"},{k:"sources",l:"Gathering quotes & studies",i:"🔍"},{k:"writing",l:"Writing article",i:"✍️"},{k:"grammar",l:"Grammar & voice check",i:"🇷🇸"},{k:"seo",l:"SEO optimization",i:"📊"},{k:"media",l:"Finding images & embeds",i:"📷"},{k:"formatting",l:"Formatting for Telegraf",i:"📋"}];
const PH_T=[{k:"ideas",l:"Finding angles",i:"💡"},{k:"sources",l:"Gathering quotes & studies",i:"🔍"},{k:"writing",l:"Writing article",i:"✍️"},{k:"grammar",l:"Grammar & voice check",i:"🇷🇸"},{k:"seo",l:"SEO optimization",i:"📊"},{k:"media",l:"Finding images & embeds",i:"📷"},{k:"formatting",l:"Formatting for Telegraf",i:"📋"}];
const PH_U=[{k:"scraping",l:"Reading source content",i:"🔗"},{k:"sources",l:"Gathering additional quotes",i:"🔍"},{k:"writing",l:"Writing article",i:"✍️"},{k:"grammar",l:"Grammar & voice check",i:"🇷🇸"},{k:"seo",l:"SEO optimization",i:"📊"},{k:"media",l:"Finding images & embeds",i:"📷"},{k:"formatting",l:"Formatting for Telegraf",i:"📋"}];

function render(){document.getElementById("app").innerHTML=state.showSetup?rSetup():rMain();bind()}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function api(body,retries=3){
for(let i=0;i<=retries;i++){
const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
if(r.ok)return await r.json();
if(r.status===429&&i<retries){const w=Math.min(parseInt(r.headers.get("retry-after")||"0")||30+i*15,90);state.error=`⏳ Rate limit, waiting ${w}s (${i+1}/${retries})...`;render();await sleep(w*1000);state.error=null;render();continue}
throw new Error(`API ${r.status}: ${(await r.text()).slice(0,200)}`)}
}
async function claude(msg,tok=1000,mod="claude-sonnet-4-20250514"){const d=await api({model:mod,max_tokens:tok,messages:msg});return d.content.map(b=>b.text||"").join("")}
async function claudeS(msg,tok=1500,mod="claude-haiku-4-5-20251001"){
// First call — may trigger web search tool use
let d=await api({model:mod,max_tokens:tok,messages:msg,tools:[{type:"web_search_20250305",name:"web_search"}]});

// If the model wants to use tools, we need to continue the conversation
let maxTurns=5;
let allMessages=[...msg];
while(d.stop_reason==="tool_use"&&maxTurns-->0){
// Add assistant response to messages
allMessages.push({role:"assistant",content:d.content});
// Find tool use blocks and create tool results
const toolResults=[];
for(const b of d.content){
if(b.type==="web_search_tool_use"||b.type==="tool_use"){
toolResults.push({type:"tool_result",tool_use_id:b.id,content:"Search completed."});
}}
if(toolResults.length===0)break;
allMessages.push({role:"user",content:toolResults});
d=await api({model:mod,max_tokens:tok,messages:allMessages,tools:[{type:"web_search_20250305",name:"web_search"}]});
}

// Collect all text blocks from final response
let texts=[];
for(const b of d.content){if(b.type==="text"&&b.text)texts.push(b.text)}
const result=texts.join("\n\n");
console.log("claudeS final:",result.slice(0,200));
return result;}
function pJ(r){const c=r.replace(/```json|```/g,"").trim();
// Try to find JSON array first, then object
const a=c.indexOf("["),b=c.indexOf("{");
let s=-1;if(a>=0&&b>=0)s=Math.min(a,b);else s=Math.max(a,b);
if(s<0)throw new Error("No JSON found in response");
const sub=c.slice(s);
// Find the matching closing bracket
try{return JSON.parse(sub)}catch{
// Try to find just the array/object portion
const isArr=sub[0]==="[";const close=isArr?"]":"}";
let depth=0;let end=-1;
for(let i=0;i<sub.length;i++){if(sub[i]===sub[0])depth++;if(sub[i]===close)depth--;if(depth===0){end=i+1;break}}
if(end>0)try{return JSON.parse(sub.slice(0,end))}catch{}
throw new Error("Could not parse JSON from response")}}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function copyF(id){const e=document.getElementById(id);if(!e)return;navigator.clipboard.writeText(e.dataset.copy||"");const b=e.querySelector('.bc');if(b){b.textContent="✓ Copied";b.classList.add("ok");setTimeout(()=>{b.textContent=b.dataset.l||"Copy";b.classList.remove("ok")},1800)}}

// ─── Pipeline Steps ───

async function discover(){
state.phase="trending";render();
const catFilter=state.cat==="Recepti"?"trending vegan RECIPES and cooking ideas":"Top Namirnice"===state.cat?"trending superfoods and ingredients":"Zdravlje"===state.cat?"plant-based health news and studies":"trending plant-based and vegan topics";
const r=await claudeS([{role:"user",content:"Search for "+catFilter+" from the past week. Check Reddit, food blogs, nutrition news.\n\nAfter searching, respond with ONLY a JSON array of 6 topics. No explanation, just the JSON array starting with [ and ending with ].\n\nFormat: [{\"title\":\"Article title\",\"angle\":\"One sentence\",\"keywords\":[\"word1\",\"word2\"],\"reason\":\"Why trending\",\"heat\":\"🔥🔥\",\"date\":\"2026-03-10\",\"source_name\":\"Source site\",\"source_url\":\"https://example.com\",\"already_covered\":false,\"is_recipe\":"+String(state.cat==="Recepti")+"}]"}]);
console.log("Discover raw:",r.slice(0,300));
try{state.ideas=pJ(r)}catch(e){console.error("Parse error:",e,"Raw:",r.slice(0,500));throw new Error("Could not parse trending results. Try again.")}
state.done.push("trending");state.picking=true;render()}

async function angles(t){
state.phase="ideas";render();
const r=await claudeS([{role:"user",content:`Find article angles for: "${t}". Search web for what people discuss about this in plant-based space.

IMPORTANT: Also search "site:plantbased.telegraf.rs ${t}" to check if plantbased.rs already has similar articles. Mark any duplicates.

Return ONLY JSON array of 6: [{"title":"Blog title","angle":"Angle","keywords":["seo"],"reason":"Why works","heat":"🔥🔥","date":"recent","source_name":"Where found","source_url":"https://...","already_covered":false,"existing_url":"only if duplicate"}]`}]);
try{state.ideas=pJ(r)}catch{state.ideas=[{title:t,angle:"Overview",keywords:[t.toLowerCase()],reason:"Requested",heat:"🔥",date:"now",source_name:"Manual",source_url:""}]}
state.done.push("ideas");state.picking=true;render()}

async function scrapeURL(url){
state.phase="scraping";render();
// Step 1: Extract full content from the article
const r=await claudeS([{role:"user",content:"Visit this URL: "+url+"\n\nRead the FULL article carefully. Extract ALL of the following:\n1. Main topic and thesis\n2. Every specific fact, statistic, and number mentioned\n3. Every study cited (exact author names, journal, year, and what the study ACTUALLY found)\n4. Every person quoted or mentioned (exact names, roles, what they said)\n5. Key arguments and conclusions\n\nThen suggest 3 article angles covering the SAME topic.\n\nRespond with ONLY JSON:\n[{\"title\":\"Title\",\"angle\":\"Angle\",\"keywords\":[\"seo\"],\"reason\":\"Why\",\"heat\":\"🔥🔥\",\"source_summary\":\"2 sentence summary\",\"source_name\":\"Site\",\"source_url\":\""+url+"\",\"already_covered\":false,\"extracted_facts\":[\"fact 1\",\"fact 2\"],\"extracted_studies\":[{\"authors\":\"Names\",\"journal\":\"Journal\",\"year\":\"Year\",\"finding\":\"EXACT finding from the article\",\"url\":\"if available\"}],\"extracted_people\":[{\"name\":\"Name\",\"role\":\"Role\",\"quote\":\"What they said\"}]}]"}],2500,"claude-sonnet-4-20250514");
try{
state.ideas=pJ(r);
// Store extracted data on the ideas so writing step can use them
state.ideas.forEach(function(idea){
idea._extractedFacts=idea.extracted_facts||[];
idea._extractedStudies=idea.extracted_studies||[];
idea._extractedPeople=idea.extracted_people||[];
});
}catch(e){
state.ideas=[{title:"Article from "+new URL(url).hostname,angle:"Rewrite of source article",keywords:["plant-based"],reason:"Imported",heat:"🔥",source_summary:"Imported from URL",source_name:new URL(url).hostname,source_url:url,already_covered:false,_extractedFacts:[],_extractedStudies:[],_extractedPeople:[]}]}
state.done.push("scraping");state.picking=true;render()}

async function getSources(idea){
state.phase="sources";state.picking=false;render();
const r=await claudeS([{role:"user",content:`Find for "${idea.title}":
1) Real Reddit/forum discussions about this topic (3-4). For each, include the ACTUAL URL of the thread/comment so it can be linked in the article.
2) Relevant scientific studies if any (1-2 with journal, year, DOI if possible).

Return JSON: {"quotes":[{"text":"What the person said","author":"Username","source":"r/vegan","type":"reddit|forum|blog","url":"https://reddit.com/r/...actual thread URL"}],"studies":[{"finding":"Key finding","journal":"Journal name","year":"2024","doi":"if available","url":"https://...link to study"}]}`}]);
try{const p=pJ(r);state.sources=p.quotes||p;state.studies=p.studies||[]}catch{state.sources=[{text:"Topic needs more coverage.",author:"Anonymous",source:"Forum",type:"forum",url:""}];state.studies=[]}
state.done.push("sources");render()}

async function writeArticle(idea,sources,studies,extractedFacts,extractedPeople){
state.phase="writing";render();
const vg=state.lang==="sr"?VOICE_GUIDE:VOICE_GUIDE_EN;
const srcStr=(sources||[]).map(function(s,i){return "["+String(i+1)+"] \""+s.text+"\" — "+s.author+" ("+s.source+") URL: "+(s.url||"no link")}).join("\n");
const studyStr=(studies||[]).map(function(s,i){return "[Study "+String(i+1)+"] "+(s.finding||"")+" Authors: "+(s.authors||"unknown")+" ("+s.journal+", "+s.year+") URL: "+(s.url||s.doi||"no link")}).join("\n");
const lenMap={short:"400-600 words, 2-3 H2 sections",medium:"600-900 words, 3-4 H2 sections",long:"900-1200 words, 4-6 H2 sections"};
const toneDesc=state.tone<30?"Very editorial, formal, objective":state.tone>70?"Warmer, slightly personal while staying professional":"Balanced editorial with approachable warmth";
const isRecipe=state.cat==="Recepti"||(idea.is_recipe===true);

let factsBlock="";
if(extractedFacts&&extractedFacts.length>0){
factsBlock="\n\nVERIFIED FACTS FROM SOURCE (use these EXACTLY, do not change or invent new ones):\n"+extractedFacts.map(function(f,i){return "- "+f}).join("\n");
}
let peopleBlock="";
if(extractedPeople&&extractedPeople.length>0){
peopleBlock="\n\nPEOPLE MENTIONED IN SOURCE (use correct names, genders, roles — do NOT change these):\n"+extractedPeople.map(function(p){return "- "+p.name+" ("+p.role+"): "+p.quote}).join("\n");
}

let recipeInstructions="";
if(isRecipe){recipeInstructions="\n\nRECIPE MODE:\n- Personal first-person opening about discovering this recipe\n- Background section about the main ingredient\n- Ingredients in <ul><li> with bold amounts\n- Step by step preparation\n- Serving suggestions\n- Warm personal tone throughout"}

const internalLinking=state.lang==="sr"?"\n\nINTERNAL LINKING: Where relevant, link terms to existing articles on the Telegraf network. Use these patterns:\n- Health/science terms: link to ona.rs/eklinika/nauka (e.g. <a href=\"https://ona.rs/eklinika/nauka\">istraživanje</a>)\n- Related food topics: link to plantbased.telegraf.rs articles\n- Use 2-3 internal links per article, on naturally relevant terms":"";

async function grammarCheck(article){
state.phase="grammar";render();
await sleep(10000);
const isSerbian=state.lang==="sr";
if(!isSerbian){state.done.push("grammar");render();return article;}
const prompt="You are a native Serbian (SRPSKI) language editor. You MUST understand: Serbian and Croatian are different standards. AI models constantly confuse them. Your job is to ensure this article is 100% Serbian standard, zero Croatian.\n\nFUNDAMENTAL SERBIAN vs CROATIAN DIFFERENCES TO CHECK:\n\n1. VOCABULARY: Serbian and Croatian have hundreds of different words for the same thing. Common mistakes AI makes:\n- Croatian 'kruh' → Serbian 'hleb'\n- Croatian 'tjedan' → Serbian 'nedelja' (for week)\n- Croatian 'vlak' → Serbian 'voz'\n- Croatian 'tisuća' → Serbian 'hiljada'\n- Croatian 'točka' → Serbian 'tačka'\n- Croatian 'zrak' → Serbian 'vazduh'\n- Croatian 'kazalište' → Serbian 'pozorište'\n- Croatian 'otok' → Serbian 'ostrvo'\n- Croatian 'luk' (onion) → Serbian 'crni luk'\n- Croatian 'rajčica' → Serbian 'paradajz'\n- Croatian 'mrkva' → Serbian 'šargarepa'\n- Croatian 'špinat' IS correct Serbian. 'Spanać' is colloquial but acceptable.\n- Croatian 'tvar' → Serbian 'materija'\n- Croatian 'ugljični' → Serbian 'ugljenični'\nIf you see ANY word that sounds Croatian, replace it with the Serbian equivalent.\n\n2. SPELLING PATTERNS: Serbian uses 'ije/je' differently than Croatian in many words. Check all ijekavian/ekavian forms — this text must be EKAVIAN (Serbian standard):\n- Croatian 'svijet' → Serbian 'svet'\n- Croatian 'vrijeme' → Serbian 'vreme'\n- Croatian 'mlijeko' → Serbian 'mleko'\n- Croatian 'liječnik' → Serbian 'lekar'\n- Croatian 'djelovanje' → Serbian 'delovanje'\n\n3. GRAMMAR:\n- Padezi (cases): check EVERY noun+adjective pair for agreement\n- Gender: adjective endings must match noun gender\n- Infinitive: Serbian prefers 'da + prezent' over infinitive in many cases\n- Vi/Vas/Vam/Vaš CAPITALIZED for formal reader address\n\n4. FORMATTING:\n- Replace ALL **markdown bold** with <strong>HTML</strong>\n- Remove ALL em-dashes (—), use commas or periods\n- Scientific names in <em> tags\n- PRESERVE all <a href> links exactly\n\n5. SENTENCE QUALITY:\n- Max 25 words per sentence, split longer ones\n- Each sentence = one clear idea\n- No run-ons\n\n6. REMOVE AI PHRASES:\n'U današnje vreme', 'Važno je napomenuti', 'Kada je reč o', 'Na kraju dana', 'Sve u svemu', 'Ispostavlja se da', 'Bez obzira da li'\n\nArticle:\n"+article.html+"\n\nReturn ONLY corrected HTML. First character must be <.";
const r=await claude([{role:"user",content:prompt}],4096);
let clean=r.replace(/```html|```/g,"").trim();
const ft=clean.indexOf("<");if(ft>0)clean=clean.slice(ft);
clean=clean.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
state.done.push("grammar");render();
return{...article,html:clean}}

h+=`<div class="ob" id="f-m" data-copy="${esc(r.meta)}"><div class="oh"><span class="ol">Meta <span style="color:${(r.meta||'').length>160?'#ef4444':'#444'};font-weight:400">(${(r.meta||'').length}/160)</span></span><button class="bc" data-l="Copy" onclick="copyF('f-m')">Copy</button></div><div class="oy"><div style="font-size:12px;color:#999;line-height:1.5">${esc(r.meta)}</div></div></div>`;
// HTML
h+=`<div class="ob" id="f-h"><div class="oh"><span class="ol">Body HTML (source mode)</span><button class="bc" data-l="Copy HTML" onclick="copyF('f-h')">Copy HTML</button></div><div class="oy" style="max-height:260px;overflow:auto"><pre>${esc(r.html)}</pre></div></div>`;

// Media suggestions
if((state.shutterstock&&state.shutterstock.length)||(state.igSuggestions&&state.igSuggestions.length)){
h+=`<div class="ob"><div class="oh"><span class="ol">Media Suggestions</span></div><div class="oy">`;
if(state.shutterstock.length){h+=`<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:6px">📷 SHUTTERSTOCK SEARCHES</div>`;
state.shutterstock.forEach((q,i)=>{
h+=`<div style="display:flex;align-items:center;justify-content:space-between;background:#111214;border-radius:8px;padding:8px 12px;margin-bottom:4px">
<span style="font-size:12px;color:#bbb">${i===0?'🖼️ Cover':'📸 Inline'}: "${esc(q)}"</span>
<a href="https://www.shutterstock.com/search/${encodeURIComponent(q)}" target="_blank" style="font-size:11px;color:#a3e635;text-decoration:none">Search →</a></div>`});h+=`</div>`}
if(state.igSuggestions&&state.igSuggestions.length){h+=`<div><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:6px">📱 INSTAGRAM EMBEDS</div>`;
state.igSuggestions.forEach(s=>{
h+=`<div style="display:flex;align-items:center;justify-content:space-between;background:#111214;border-radius:8px;padding:8px 12px;margin-bottom:4px">
<span style="font-size:12px;color:#bbb"><span style="color:#f472b6">${esc(s.hashtag)}</span> — ${esc(s.description)}</span>
<a href="https://www.instagram.com/explore/tags/${encodeURIComponent((s.hashtag||'').replace('#',''))}/" target="_blank" style="font-size:11px;color:#a3e635;text-decoration:none">Browse →</a></div>`});h+=`</div>`}
h+=`</div></div>`}

// Preview
h+=`<div class="ob"><div class="oh"><span class="ol">Preview</span></div><div style="padding:18px"><div class="pv"><h1>${esc(r.title)}</h1><p style="font-size:11px;color:#999;font-style:italic;margin-bottom:14px">${esc(r.meta)}</p><hr style="border:none;border-top:1px solid #e5e5e5;margin:0 0 18px">${r.html}</div></div></div>`;
h+=`<div style="text-align:center;font-size:12px;color:#444;padding:6px 0 14px">Pick another idea to regenerate</div></div>`}

// Empty
if(!state.phase&&!state.result)h+=`<div style="text-align:center;padding:44px 20px"><div style="font-size:38px;margin-bottom:10px">🌱</div><div style="font-size:13px;color:#555;max-width:400px;margin:0 auto;line-height:1.8">Hit <strong style="color:#a3e635">Discover Trending</strong>, enter a topic, or paste a URL. Pick an idea and the pipeline handles research, writing, grammar, SEO, and CMS formatting.</div></div>`;

h+=`</main>`;return h}

// ─── Events ───
function bind(){
const sk=document.getElementById("savk");
if(sk){sk.onclick=()=>{const k=(document.getElementById("sk").value||"").trim();if(k.startsWith("sk-ant-")){state.apiKey=k;localStorage.setItem("pb_api_key",k);state.showSetup=false;render()}};document.getElementById("sk").onkeydown=e=>{if(e.key==="Enter")sk.click()};return}
document.getElementById("bset").onclick=()=>{localStorage.removeItem("pb_api_key");state.showSetup=true;render()};
document.querySelectorAll("[data-lg]").forEach(b=>{b.onclick=()=>{state.lang=b.dataset.lg;render()}});
const it=document.getElementById("itop");if(it){it.oninput=e=>{state.topic=e.target.value};it.onkeydown=e=>{if(e.key==="Enter"&&state.topic.trim())runTopic()}}
const iu=document.getElementById("iurl");if(iu){iu.oninput=e=>{state.url=e.target.value};iu.onkeydown=e=>{if(e.key==="Enter"&&state.url.trim())runURL()}}
document.getElementById("scat").onchange=e=>{state.cat=e.target.value};
document.getElementById("slen").onchange=e=>{state.length=e.target.value};
document.getElementById("rtone").oninput=e=>{state.tone=parseInt(e.target.value);document.querySelector('.lbl:last-of-type')||render()};
document.getElementById("bdisc").onclick=runDiscover;
document.getElementById("btop").onclick=runTopic;
document.getElementById("burl").onclick=runURL;
document.querySelectorAll("[data-idea]").forEach(c=>{if(c.classList.contains("ck"))c.onclick=()=>pick(parseInt(c.dataset.idea))});
const fh=document.getElementById("f-h");if(fh&&state.result)fh.dataset.copy=state.result.html;
}
render();
</script>
</body>
</html>
